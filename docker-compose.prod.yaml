services:
  app:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    image: quiz-backend:prod
    env_file:
      - .env
    ports:
      - '${APP_PORT:-5000}:8000'
    restart: unless-stopped
    networks:
      - app

  queue:
    image: quiz-backend:prod
    env_file:
      - .env
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--max-time=3600"]
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app

  schedule:
    image: quiz-backend:prod
    env_file:
      - .env
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app

  reverb:
    image: quiz-backend:prod
    env_file:
      - .env
    command: ["sh", "-lc", "php artisan reverb:start --host=${REVERB_SERVER_HOST:-0.0.0.0} --port=${REVERB_SERVER_PORT:-8080}"]
    ports:
      - '${REVERB_SERVER_PORT:-8080}:${REVERB_SERVER_PORT:-8080}'
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge
