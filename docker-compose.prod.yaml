services:
  tntn_quiz_octane:
    image: fujimiyashion/tntn-quiz:${GIT_TAG:-latest}
    env_file:
      - .env
    command: ["sh", "-lc", "php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --workers=${OCTANE_WORKERS:-auto} --task-workers=${OCTANE_TASK_WORKERS:-auto} --max-requests=${OCTANE_MAX_REQUESTS:-1000}"]
    ports:
      - '${APP_PORT:-7000}:8000'
    volumes:
      - tntn_quiz_storage:/var/www/html/storage
      - tntn_quiz_bootstrap_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",8000); if (!$$s) { exit(1);} fclose($$s);'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - tntn_quiz_app

  tntn_quiz_queue:
    image: fujimiyashion/tntn-quiz:${GIT_TAG:-latest}
    env_file:
      - .env
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--max-time=3600"]
    volumes:
      - tntn_quiz_storage:/var/www/html/storage
      - tntn_quiz_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - tntn_quiz_octane
    restart: unless-stopped
    networks:
      - tntn_quiz_app

  tntn_quiz_schedule:
    image: fujimiyashion/tntn-quiz:${GIT_TAG:-latest}
    env_file:
      - .env
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - tntn_quiz_storage:/var/www/html/storage
      - tntn_quiz_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - tntn_quiz_octane
    restart: unless-stopped
    networks:
      - tntn_quiz_app

  tntn_quiz_reverb:
    image: fujimiyashion/tntn-quiz:${GIT_TAG:-latest}
    env_file:
      - .env
    command: ["sh", "-lc", "php artisan reverb:start --host=${REVERB_SERVER_HOST:-0.0.0.0} --port=${REVERB_SERVER_PORT:-7070}"]
    ports:
      - '${REVERB_SERVER_PORT:-7070}:${REVERB_SERVER_PORT:-7070}'
    volumes:
      - tntn_quiz_storage:/var/www/html/storage
      - tntn_quiz_bootstrap_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$p=getenv(\"REVERB_SERVER_PORT\")?:7070; $$s=@fsockopen(\"127.0.0.1\",(int)$$p); if (!$$s) { exit(1);} fclose($$s);'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      - tntn_quiz_octane
    restart: unless-stopped
    networks:
      - tntn_quiz_app

networks:
  tntn_quiz_app:
    driver: bridge

volumes:
  tntn_quiz_storage:
  tntn_quiz_bootstrap_cache:
